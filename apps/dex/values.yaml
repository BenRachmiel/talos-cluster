# Dex — standalone OIDC provider for the cluster
# Install with:
#   helm repo add dex https://charts.dexidp.io
#   helm install dex dex/dex -n dex --create-namespace -f values.yaml

config:
  issuer: https://dex.k8s.benrachmiel.org
  storage:
    type: kubernetes
    config:
      inCluster: true
  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: https://dex.k8s.benrachmiel.org/callback
  staticClients:
    - id: argo-cd
      name: ArgoCD
      secret: $ARGOCD_CLIENT_SECRET
      redirectURIs:
        - https://argo.k8s.benrachmiel.org/auth/callback
    - id: grafana
      name: Grafana
      secret: $GRAFANA_CLIENT_SECRET
      redirectURIs:
        - https://grafana.k8s.benrachmiel.org/login/generic_oauth

envFrom:
  - secretRef:
      name: dex-secrets

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 25m
    memory: 128Mi

