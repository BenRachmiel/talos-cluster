# cert-manager — automated TLS certificates
# Install with:
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager -n cert-manager --create-namespace \
#     --set crds.enabled=true -f cert-manager-values.yaml

config:
  apiVersion: controller.config.cert-manager.io/v1alpha1
  kind: ControllerConfiguration
  enableGatewayAPI: true

# Use public resolvers for DNS-01 self-checks instead of cluster DNS.
# Required because the ad.k8s.benrachmiel.org subzone is delegated to Samba
# and is not visible through CoreDNS (returns SERVFAIL).
dns01RecursiveNameservers: "1.1.1.1:53,8.8.8.8:53"
dns01RecursiveNameserversOnly: true

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 25m
    memory: 64Mi

webhook:
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi

cainjector:
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi
