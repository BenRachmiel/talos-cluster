# Grafana Alloy (DaemonSet) — node-local metrics + logs
# Handles: kubelet, cAdvisor, node-exporter, Cilium agent, Hubble metrics, pod logs

alloy:
  configMap:
    content: |
      // ============================================================
      // NODE-LOCAL METRICS — kubelet, cAdvisor, node-exporter, Cilium
      // ============================================================

      // Discover nodes (for kubelet + cAdvisor)
      discovery.kubernetes "nodes" {
        role = "node"
      }

      prometheus.scrape "kubelet" {
        targets    = discovery.kubernetes.nodes.targets
        scheme     = "https"
        tls_config {
          insecure_skip_verify = true
        }
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
      }

      discovery.relabel "cadvisor" {
        targets = discovery.kubernetes.nodes.targets
        rule {
          replacement  = "/metrics/cadvisor"
          target_label = "__metrics_path__"
        }
      }

      prometheus.scrape "cadvisor" {
        targets    = discovery.relabel.cadvisor.output
        scheme     = "https"
        tls_config {
          insecure_skip_verify = true
        }
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
      }

      // Discover local pods only (node-exporter, Cilium agent)
      discovery.kubernetes "local_pods" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + sys.env("HOSTNAME")
        }
      }

      // Node-exporter (via prometheus.io annotations)
      discovery.relabel "node_exporter" {
        targets = discovery.kubernetes.local_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex         = "prometheus-node-exporter"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_port", "__meta_kubernetes_pod_ip"]
          regex         = "(\\d+);(.*)"
          target_label  = "__address__"
          replacement   = "$2:$1"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
      }

      prometheus.scrape "node_exporter" {
        targets    = discovery.relabel.node_exporter.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
      }

      // Cilium agent (local pod on each node)
      discovery.relabel "cilium" {
        targets = discovery.kubernetes.local_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex         = "cilium-agent"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "cilium" {
        targets    = discovery.relabel.cilium.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
      }

      // Hubble metrics (exposed on Cilium agent pods, port 9965)
      discovery.relabel "hubble" {
        targets = discovery.kubernetes.local_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex         = "cilium-agent"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          target_label  = "__address__"
          replacement   = "$1:9965"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "hubble" {
        targets    = discovery.relabel.hubble.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
      }

      prometheus.remote_write "victoriametrics" {
        endpoint {
          url = "http://vmsingle-vm-stack-victoria-metrics-k8s-stack.monitoring.svc:8428/api/v1/write"
        }
      }

      // ============================================================
      // LOGS — collect from all local pods and push to Loki
      // ============================================================

      discovery.kubernetes "pod_logs" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pod_logs.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pipeline.receiver]
      }

      loki.process "pipeline" {
        stage.drop {
          expression = "^\\s*$"
        }
        stage.json {
          expressions = {
            level   = "level",
            msg     = "msg",
            message = "message",
          }
          drop_malformed = true
        }
        stage.labels {
          values = {
            level = "",
          }
        }
        forward_to = [loki.write.loki.receiver]
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc:80/loki/api/v1/push"
        }
      }

controller:
  type: daemonset
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

serviceAccount:
  create: true

rbac:
  create: true
