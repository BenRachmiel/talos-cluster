# ArgoCD
# Install with:
#   helm repo add argo https://argoproj.github.io/argo-helm
#   helm install argocd argo/argo-cd -n argocd --create-namespace -f argocd-values.yaml

configs:
  cm:
    url: https://argo.k8s.benrachmiel.org
    admin.enabled: "false"
    dex.config: |
      connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $dex.github.clientID
            clientSecret: $dex.github.clientSecret
  rbac:
    policy.csv: |
      g, BenRachmiel, role:admin
    policy.default: role:readonly
    scopes: '[preferred_username]'
  params:
    server.insecure: true

extraObjects:
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: argocd-github-oauth
      namespace: argocd
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault
      target:
        name: argocd-secret
        creationPolicy: Merge
      data:
        - secretKey: dex.github.clientID
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            key: argocd/github-oauth
            metadataPolicy: None
            property: clientID
        - secretKey: dex.github.clientSecret
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            key: argocd/github-oauth
            metadataPolicy: None
            property: clientSecret

controller:
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

server:
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

repoServer:
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

dex:
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 25m
      memory: 128Mi

redis:
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

applicationSet:
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

notifications:
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi
