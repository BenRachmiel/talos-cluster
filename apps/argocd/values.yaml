# ArgoCD
# Install with:
#   helm repo add argo https://argoproj.github.io/argo-helm
#   helm install argocd argo/argo-cd -n argocd --create-namespace -f argocd-values.yaml

configs:
  cm:
    url: https://argo.k8s.benrachmiel.org
    admin.enabled: "false"
    oidc.config: |
      name: Dex
      issuer: https://dex.k8s.benrachmiel.org
      clientID: argo-cd
      clientSecret: $oidc.dex.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_HTTPRoute: |
      jqPathExpressions:
        - .spec.parentRefs[]?.group
        - .spec.parentRefs[]?.kind
        - .spec.rules[]?.matches
        - .spec.rules[]?.backendRefs[]?.group
        - .spec.rules[]?.backendRefs[]?.kind
        - .spec.rules[]?.backendRefs[]?.weight
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_Gateway: |
      jqPathExpressions:
        - .spec.listeners[]?.allowedRoutes
        - .spec.listeners[]?.tls?.certificateRefs[]?.group
        - .spec.listeners[]?.tls?.certificateRefs[]?.kind
  rbac:
    policy.csv: |
      g, BenRachmiel, role:admin
    policy.default: role:readonly
    scopes: '[preferred_username]'
  params:
    server.insecure: true

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: argocd
      namespace: argocd
    spec:
      parentRefs:
        - name: main-gateway
          namespace: kube-system
      hostnames:
        - "argo.k8s.benrachmiel.org"
      rules:
        - backendRefs:
            - name: argocd-server
              port: 80
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: argocd-oidc-secret
      namespace: argocd
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault
      target:
        name: argocd-secret
        creationPolicy: Merge
      data:
        - secretKey: oidc.dex.clientSecret
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            key: dex/clients
            metadataPolicy: None
            property: argocd

controller:
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

server:
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

repoServer:
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

dex:
  enabled: false

redis:
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

applicationSet:
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

notifications:
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi
