# Loki — log storage, single-binary mode for small clusters
# Install with:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm install loki grafana/loki -n monitoring --create-namespace -f loki-values.yaml

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    storageClass: ""  # Update to your Ceph storageclass
    size: 20Gi

# Disable components not needed in single-binary mode
gateway:
  enabled: true
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 25m
      memory: 32Mi

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 14d
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
  compactor:
    retention_enabled: true
