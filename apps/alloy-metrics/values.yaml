# Grafana Alloy (StatefulSet) — cluster-wide metric scraping
# Handles: kube-state-metrics, annotation-based pods, VM components

alloy:
  clustering:
    enabled: true
  configMap:
    content: |
      // ============================================================
      // CLUSTER-WIDE METRICS — annotation-based + dedicated targets
      // ============================================================

      // Discover all pods with prometheus.io/scrape annotation
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_metrics" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
          action        = "keep"
        }
        // Exclude node-exporter — scraped by the DaemonSet
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex         = "prometheus-node-exporter"
          action        = "drop"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          target_label  = "__metrics_path__"
          regex         = "(.+)"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_port", "__meta_kubernetes_pod_ip"]
          regex         = "(\\d+);(.*)"
          target_label  = "__address__"
          replacement   = "$2:$1"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "pod_metrics" {
        honor_labels = true
        targets    = discovery.relabel.pod_metrics.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // ============================================================
      // VM COMPONENTS — dedicated scrape targets
      // ============================================================

      // VMSingle
      discovery.kubernetes "vmsingle" {
        role = "pod"
        namespaces {
          names = ["monitoring"]
        }
        selectors {
          role  = "pod"
          label = "app.kubernetes.io/name=vmsingle"
        }
      }

      discovery.relabel "vmsingle" {
        targets = discovery.kubernetes.vmsingle.targets
        rule {
          target_label = "__address__"
          replacement  = "vmsingle-vm-stack-victoria-metrics-k8s-stack.monitoring.svc:8428"
        }
        rule {
          target_label = "namespace"
          replacement  = "monitoring"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "vmsingle" {
        targets    = discovery.relabel.vmsingle.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // VM Operator
      discovery.kubernetes "vm_operator" {
        role = "pod"
        namespaces {
          names = ["monitoring"]
        }
        selectors {
          role  = "pod"
          label = "app.kubernetes.io/name=victoria-metrics-operator"
        }
      }

      discovery.relabel "vm_operator" {
        targets = discovery.kubernetes.vm_operator.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          target_label  = "__address__"
          replacement   = "$1:8080"
        }
        rule {
          target_label = "namespace"
          replacement  = "monitoring"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "vm_operator" {
        targets    = discovery.relabel.vm_operator.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // VMAlert
      discovery.kubernetes "vmalert" {
        role = "pod"
        namespaces {
          names = ["monitoring"]
        }
        selectors {
          role  = "pod"
          label = "app.kubernetes.io/name=vmalert"
        }
      }

      discovery.relabel "vmalert" {
        targets = discovery.kubernetes.vmalert.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          target_label  = "__address__"
          replacement   = "$1:8080"
        }
        rule {
          target_label = "namespace"
          replacement  = "monitoring"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "vmalert" {
        targets    = discovery.relabel.vmalert.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // Alertmanager
      discovery.kubernetes "alertmanager" {
        role = "pod"
        namespaces {
          names = ["monitoring"]
        }
        selectors {
          role  = "pod"
          label = "app.kubernetes.io/name=vmalertmanager"
        }
      }

      discovery.relabel "alertmanager" {
        targets = discovery.kubernetes.alertmanager.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          target_label  = "__address__"
          replacement   = "$1:9093"
        }
        rule {
          target_label = "namespace"
          replacement  = "monitoring"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "alertmanager" {
        targets    = discovery.relabel.alertmanager.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // ============================================================
      // CONTROL-PLANE COMPONENTS + COREDNS
      // Talos exposes scheduler/cm/apiserver on 0.0.0.0 (token auth);
      // etcd needs cluster.etcd.extraArgs.listen-metrics-urls in the
      // controlplane machineconfig. Job labels match kube-prometheus so
      // the bundled dashboards and SLO vmrules resolve.
      // ============================================================

      // kube-apiserver — via the default/kubernetes endpoints
      discovery.kubernetes "apiserver" {
        role = "endpoints"
        namespaces {
          names = ["default"]
        }
      }

      discovery.relabel "apiserver" {
        targets = discovery.kubernetes.apiserver.targets
        rule {
          source_labels = ["__meta_kubernetes_service_name", "__meta_kubernetes_endpoint_port_name"]
          regex         = "kubernetes;https"
          action        = "keep"
        }
        rule {
          target_label = "job"
          replacement  = "apiserver"
        }
      }

      prometheus.scrape "apiserver" {
        targets           = discovery.relabel.apiserver.output
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file     = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          server_name = "kubernetes.default.svc"
        }
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // kube-scheduler — static pod, secure metrics on :10259
      discovery.kubernetes "kube_scheduler" {
        role = "pod"
        namespaces {
          names = ["kube-system"]
        }
        selectors {
          role  = "pod"
          label = "component=kube-scheduler"
        }
      }

      discovery.relabel "kube_scheduler" {
        targets = discovery.kubernetes.kube_scheduler.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          target_label  = "__address__"
          replacement   = "$1:10259"
        }
        rule {
          target_label = "job"
          replacement  = "kube-scheduler"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "kube_scheduler" {
        targets           = discovery.relabel.kube_scheduler.output
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // kube-controller-manager — static pod, secure metrics on :10257
      discovery.kubernetes "kube_controller_manager" {
        role = "pod"
        namespaces {
          names = ["kube-system"]
        }
        selectors {
          role  = "pod"
          label = "component=kube-controller-manager"
        }
      }

      discovery.relabel "kube_controller_manager" {
        targets = discovery.kubernetes.kube_controller_manager.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          target_label  = "__address__"
          replacement   = "$1:10257"
        }
        rule {
          target_label = "job"
          replacement  = "kube-controller-manager"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "kube_controller_manager" {
        targets           = discovery.relabel.kube_controller_manager.output
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // etcd — Talos-managed service; plaintext metrics on the CP node :2381
      discovery.kubernetes "etcd_nodes" {
        role = "node"
      }

      discovery.relabel "etcd" {
        targets = discovery.kubernetes.etcd_nodes.targets
        rule {
          source_labels = ["__meta_kubernetes_node_labelpresent_node_role_kubernetes_io_control_plane"]
          regex         = "true"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_address_InternalIP"]
          target_label  = "__address__"
          replacement   = "$1:2381"
        }
        rule {
          target_label = "job"
          replacement  = "etcd"
        }
      }

      prometheus.scrape "etcd" {
        targets    = discovery.relabel.etcd.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // CoreDNS — kube-dns pods, plaintext metrics on :9153
      discovery.kubernetes "coredns" {
        role = "pod"
        namespaces {
          names = ["kube-system"]
        }
        selectors {
          role  = "pod"
          label = "k8s-app=kube-dns"
        }
      }

      discovery.relabel "coredns" {
        targets = discovery.kubernetes.coredns.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          target_label  = "__address__"
          replacement   = "$1:9153"
        }
        rule {
          target_label = "job"
          replacement  = "coredns"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "coredns" {
        targets    = discovery.relabel.coredns.output
        forward_to = [prometheus.remote_write.victoriametrics.receiver]
        clustering {
          enabled = true
        }
      }

      // Remote write to VictoriaMetrics
      prometheus.remote_write "victoriametrics" {
        endpoint {
          url = "http://vmsingle-vm-stack-victoria-metrics-k8s-stack.monitoring.svc:8428/api/v1/write"
        }
      }

controller:
  type: statefulset
  replicas: 2
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

serviceAccount:
  create: true

rbac:
  create: true
