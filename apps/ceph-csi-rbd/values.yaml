# ceph-csi-rbd — Ceph RBD CSI driver for block storage (databases, Vault)
# Install with:
#   helm repo add ceph-csi https://ceph.github.io/csi-charts
#   helm install ceph-csi-rbd ceph-csi/ceph-csi-rbd -n ceph-csi-rbd --create-namespace -f ceph-csi-rbd-values.yaml

csiConfig:
  - clusterID: "5af27d00-f460-4759-bad6-b8f4d888ceec"
    monitors:
      - "192.168.1.2:6789"
      - "192.168.1.3:6789"
      - "192.168.1.4:6789"

storageClass:
  create: true
  name: ceph-rbd
  isDefault: true
  clusterID: "5af27d00-f460-4759-bad6-b8f4d888ceec"
  pool: hdd-pool
  reclaimPolicy: Retain
  allowVolumeExpansion: true
  mountOptions: []
  parameters:
    imageFormat: "2"
    imageFeatures: "layering,exclusive-lock,object-map,fast-diff"

secret:
  create: false
  name: csi-rbd-secret

provisioner:
  replicaCount: 1
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

nodeplugin:
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
