# VictoriaMetrics — storage + alerting only, Alloy handles all collection
# Install with:
#   helm repo add vm https://victoriametrics.github.io/helm-charts/
#   helm install victoria vm/victoria-metrics-k8s-stack -n monitoring --create-namespace -f values.yaml

# --- VMSingle (storage + query) ---
vmsingle:
  enabled: true
  spec:
    retentionPeriod: "14d"
    storage:
      storageClassName: ceph-rbd
      resources:
        requests:
          storage: 20Gi
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# --- VMAgent disabled — Alloy handles metric collection ---
vmagent:
  enabled: false

# --- VMAlert (alerting rules evaluation) ---
vmalert:
  enabled: true
  spec:
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# --- Alertmanager ---
alertmanager:
  enabled: true
  spec:
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 64Mi

# --- Grafana ---
grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: ceph-rbd
    size: 5Gi
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
  grafana.ini:
    server:
      root_url: https://grafana.k8s.benrachmiel.org
    auth.generic_oauth:
      enabled: true
      name: Dex
      client_id: grafana
      client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email
      auth_url: https://dex.k8s.benrachmiel.org/auth
      token_url: https://dex.k8s.benrachmiel.org/token
      api_url: https://dex.k8s.benrachmiel.org/userinfo
      allow_sign_up: true
      use_refresh_token: true
      role_attribute_path: "contains(preferred_username, 'BenRachmiel') && 'Admin' || 'Viewer'"
    auth:
      disable_login_form: true
  envFromSecret: grafana-oidc-secret
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc:80
      access: proxy
      isDefault: false

# --- VM Operator — use cert-manager for webhook TLS ---
victoria-metrics-operator:
  admissionWebhooks:
    certManager:
      enabled: true

# --- Disable bundled components replaced by Alloy ---
prometheus:
  enabled: false

prometheus-node-exporter:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9100"
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 25m
      memory: 32Mi

kube-state-metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: grafana
      namespace: monitoring
    spec:
      parentRefs:
        - name: main-gateway
          namespace: kube-system
      hostnames:
        - "grafana.k8s.benrachmiel.org"
      rules:
        - backendRefs:
            - name: vm-stack-grafana
              port: 80
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: grafana-oidc-secret
      namespace: monitoring
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault
      target:
        name: grafana-oidc-secret
        creationPolicy: Owner
      data:
        - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
          remoteRef:
            conversionStrategy: Default
            decodingStrategy: None
            key: dex/clients
            metadataPolicy: None
            property: grafana
