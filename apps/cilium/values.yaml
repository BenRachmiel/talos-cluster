# Cilium Helm values — tuned for Talos on bare-metal/Proxmox
# Install with: helm install cilium cilium/cilium -n kube-system -f cilium-values.yaml

ipam:
  mode: kubernetes

# Replace kube-proxy (disabled in Talos config)
kubeProxyReplacement: true
k8sServiceHost: localhost  # Talos KubePrism proxy
k8sServicePort: 7445

# Talos-specific: drop SYS_MODULE (Talos blocks kernel module loading)
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Talos-specific: cgroup is already mounted
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# --- Full eBPF datapath ---
routingMode: native
ipv4NativeRoutingCIDR: "10.244.0.0/16"
autoDirectNodeRoutes: true
devices: "ens18"
bpf:
  datapathMode: netkit
  masquerade: true
enableIPv4BIGTCP: true
bandwidthManager:
  enabled: true
MTU: 0  # auto-detect

extraConfig:
  direct-routing-device: "ens18"

# L2 announcements — replaces MetalLB
l2announcements:
  enabled: true

externalIPs:
  enabled: true

# Gateway API — replaces ingress controller + OpenShift routes
gatewayAPI:
  enabled: true

# Hubble observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction

# Operator
operator:
  replicas: 1
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: hubble-ui
      namespace: kube-system
    spec:
      parentRefs:
        - name: main-gateway
          namespace: default
      hostnames:
        - "hubble.k8s.benrachmiel.org"
      rules:
        - backendRefs:
            - name: hubble-ui
              port: 80
