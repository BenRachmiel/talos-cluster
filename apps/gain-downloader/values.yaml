image:
  frontend:
    repository: ghcr.io/benrachmiel/gain/images/frontend
    tag: sha-3f12b9c
  backend:
    repository: ghcr.io/benrachmiel/gain/images/backend
    tag: sha-3f12b9c

config:
  maxConcurrent: "4"
  bindAddr: "0.0.0.0:3000"

oauthProxy:
  issuerURL: https://dex.k8s.benrachmiel.org
  clientID: music-downloader
  redirectURL: https://downloader.k8s.benrachmiel.org/oauth2/callback
  cookieName: _oauth2_proxy_downloader
  extraArgs:
    - --skip-provider-button=true

secrets:
  existingSecret: gain-downloader-secrets

persistence:
  music:
    existingClaim: preamp-music

gateway:
  enabled: true
  host: downloader.k8s.benrachmiel.org

extraObjects:
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: gain-downloader-secrets
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault
      target:
        name: gain-downloader-secrets
        deletionPolicy: Retain
      data:
        - secretKey: SOURCE_API
          remoteRef:
            key: preamp/sources
            property: source-api
        - secretKey: SOURCE_MIRRORS
          remoteRef:
            key: preamp/sources
            property: source-mirrors
        - secretKey: OAUTH2_PROXY_CLIENT_SECRET
          remoteRef:
            key: dex/clients
            property: music-downloader
        - secretKey: OAUTH2_PROXY_COOKIE_SECRET
          remoteRef:
            key: navidrome/oauth2-proxy
            property: cookie-secret
