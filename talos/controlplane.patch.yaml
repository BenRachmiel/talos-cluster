# Talos control plane machine config patch
# Apply with: talosctl gen config ... --config-patch-control-plane @controlplane.patch.yaml

machine:
  install:
    disk: /dev/sda
    image: factory.talos.dev/installer-secureboot/3a7f14795e9b2a1f5d931d878a2262bd4eb0b7f6ab95816bb9dce1bac7a6845e:v1.12.5
    wipe: false

  network:
    interfaces:
      - deviceSelector:
          busPath: "0*"
        dhcp: false
        addresses:
          - 192.168.2.91/16
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1  # Update to your gateway
        vip:
          ip: 192.168.2.90

  # crun as default OCI runtime (extension auto-registers it, we just set it as default)
  files:
    - content: |
        [plugins."io.containerd.cri.v1.runtime".containerd]
          default_runtime_name = "crun"
      path: /etc/cri/conf.d/20-customization.part
      op: create

  sysctls:
    net.core.somaxconn: "65535"
    net.ipv4.ip_forward: "1"
    vm.max_map_count: "262144"

  features:
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: false

  kubelet:
    extraArgs:
      rotate-server-certificates: true
      image-gc-high-threshold: "70"
      image-gc-low-threshold: "50"

cluster:
  # Disable default CNI — Cilium takes over
  network:
    cni:
      name: none
  proxy:
    disabled: true

  # Single CP — disable etcd HA safeguards
  etcd:
    extraArgs:
      auto-compaction-mode: periodic
      auto-compaction-retention: "5m"
      quota-backend-bytes: "4294967296"  # 4GB — generous for small cluster

  controllerManager:
    extraArgs:
      bind-address: "0.0.0.0"

  scheduler:
    extraArgs:
      bind-address: "0.0.0.0"

  apiServer:
    extraArgs:
      bind-address: "0.0.0.0"
    certSANs:
      - 129.159.148.252
      - 192.168.2.90
