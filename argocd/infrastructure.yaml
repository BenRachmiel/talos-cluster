# ApplicationSet — raw manifests from infrastructure/*/
# Each subdirectory becomes a separate Application
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/BenRachmiel/talos-cluster.git
        revision: main
        directories:
          - path: "infrastructure/*"
  template:
    metadata:
      name: "infra-{{ .path.basename }}"
      annotations:
        # Diff against a server-side-apply dry-run so API-server/CRD-defaulted
        # fields (e.g. ExternalSecret's conversionStrategy, decodingStrategy,
        # target.deletionPolicy, template.engineVersion) don't read as drift.
        argocd.argoproj.io/compare-options: ServerSideDiff=true
    spec:
      project: default
      source:
        repoURL: https://github.com/BenRachmiel/talos-cluster.git
        targetRevision: main
        path: "{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: kube-system
      # restartedAt is operational residue from `kubectl rollout restart`; it
      # legitimately lives outside git, so ignore it rather than reverting
      # (which would force a needless pod rollout).
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - '.spec.template.metadata.annotations."kubectl.kubernetes.io/restartedAt"'
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - '.spec.template.metadata.annotations."kubectl.kubernetes.io/restartedAt"'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
