# Bootstrap Application for the COMFI / matrix-system gitops repo on GitLab.
#
# This Application points at the gitops repo's apps/ directory. Whatever
# Applications live in that directory (currently dev.yaml; pre-prod.yaml
# coming in Phase 3) become children of this one, app-of-apps style.
#
# Repository credentials live in the Secret repo-matrix-gitops (created by
# the ExternalSecret in infrastructure/argocd-repos/), so ArgoCD can pull
# the private GitLab repo without static credentials in git.
#
# Post-Phase-3: gitops is single-branch on `main` with overlays/dev and
# overlays/pre-prod. This Application scans apps/ for child Applications
# (currently comfi-dev and comfi-pre-prod).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.benrachmiel.org/matrix/udp-poc/gitops.git
    targetRevision: main
    path: apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
