apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak-test
spec:
  parentRefs:
    - name: main-gateway
      namespace: kube-system
  hostnames:
    - "keycloak-test.k8s.benrachmiel.org"
  rules:
    - backendRefs:
        - name: keycloak-keycloakx-http
          port: 80
