---
# GitLab registry credentials for pulling private images
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-registry
  namespace: navidrome
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: gitlab-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"gitlab.benrachmiel.org:5050":{"username":"{{ .username }}","password":"{{ .password }}"}}}
  data:
    - secretKey: username
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: gitlab/music-downloader-deploy
        metadataPolicy: None
        property: username
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: gitlab/music-downloader-deploy
        metadataPolicy: None
        property: password
---
# Navidrome API credentials for the music downloader
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: navidrome-api
  namespace: navidrome
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: navidrome-api
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: navidrome/api
        metadataPolicy: None
        property: username
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: navidrome/api
        metadataPolicy: None
        property: password
---
# oauth2-proxy secrets for Dex OIDC auth
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: navidrome
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: dex/clients
        metadataPolicy: None
        property: music-downloader
    - secretKey: cookie-secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: navidrome/oauth2-proxy
        metadataPolicy: None
        property: cookie-secret
