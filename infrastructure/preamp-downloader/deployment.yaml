apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-downloader
  namespace: pedals
  labels:
    app: music-downloader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: music-downloader
  template:
    metadata:
      labels:
        app: music-downloader
    spec:
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: frontend
          image: gitlab.benrachmiel.org:5050/bvf2104/music-downloader-from-csv/frontend:9b83cd16de430c7971a0d66a2886287dfcb0fb18
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: backend
          image: gitlab.benrachmiel.org:5050/bvf2104/music-downloader-from-csv/backend:9b83cd16de430c7971a0d66a2886287dfcb0fb18
          imagePullPolicy: Always
          env:
            - name: BIND_ADDR
              value: "0.0.0.0:3000"
            - name: MAX_CONCURRENT
              value: "4"
          volumeMounts:
            - name: music
              mountPath: /music
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:latest
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://dex.k8s.benrachmiel.org
            - --client-id=music-downloader
            - --upstream=http://localhost:8080
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://downloader.k8s.benrachmiel.org/oauth2/callback
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-name=_oauth2_proxy_downloader
            - --skip-provider-button=true
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: cookie-secret
          ports:
            - containerPort: 4180
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: music
          persistentVolumeClaim:
            claimName: preamp-music
