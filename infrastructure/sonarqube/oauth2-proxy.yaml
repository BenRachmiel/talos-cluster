apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: sonarqube
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://dex.k8s.benrachmiel.org
            - --client-id=sonarqube
            - --redirect-url=https://sonarqube.k8s.benrachmiel.org/oauth2/callback
            - --upstream=http://sonarqube-sonarqube.sonarqube.svc:9000
            - --http-address=0.0.0.0:4180
            - --cookie-name=_oauth2_proxy_sonarqube
            - --email-domain=*
            - --skip-provider-button=true
            - --pass-user-headers=true
            - --skip-auth-route=^/api/
            - --skip-auth-route=^/batch/
          envFrom:
            - secretRef:
                name: sonarqube-oauth-secrets
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: sonarqube
  labels:
    app: oauth2-proxy
spec:
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: http
      protocol: TCP
