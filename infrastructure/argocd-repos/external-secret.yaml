# ArgoCD repository credentials for the matrix-system/gitops repo on GitLab.
#
# The infrastructure ApplicationSet auto-discovers this directory. The
# ExternalSecret pulls the deploy token + username from Vault and renders
# them into a Secret with the magic ArgoCD label so ArgoCD treats it as
# a repo credential.
#
# Vault layout:
#   secret/gitlab/deploy
#     matrix-gitops-deploy-token: <gitlab deploy token value>
#     matrix-gitops-deploy-user:  <deploy token name, e.g. argocd-readonly>
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-matrix-gitops
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: repo-matrix-gitops
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        url: https://gitlab.benrachmiel.org/matrix/udp-poc/gitops.git
        username: "{{ .username }}"
        password: "{{ .token }}"
        type: git
  data:
    - secretKey: token
      remoteRef:
        key: gitlab/deploy
        property: matrix-gitops-deploy-token
    - secretKey: username
      remoteRef:
        key: gitlab/deploy
        property: matrix-gitops-deploy-user
