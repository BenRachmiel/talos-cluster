# Gateway API resources — replaces OpenShift routes and ingress controller
# Apply after Cilium is running with gatewayAPI.enabled: true
# Note: GatewayClass "cilium" is managed by Cilium's Helm chart — don't define it here
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: default
  annotations:
    io.cilium/lb-ipam-ips: "192.168.2.200"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.k8s.benrachmiel.org"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-k8s-tls
      allowedRoutes:
        namespaces:
          from: All
