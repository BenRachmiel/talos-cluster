# Cilium L2 announcement policy + IP pool — replaces MetalLB
# Apply after Cilium is running
---
apiVersion: "cilium.io/v2"
kind: CiliumLoadBalancerIPPool
metadata:
  name: default-pool
spec:
  blocks:
    - start: "192.168.2.200"  # Adjust to your available range
      stop: "192.168.2.230"
---
apiVersion: "cilium.io/v2"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2
spec:
  loadBalancerIPs: true
  interfaces:
    - ^eth[0-9]+
    - ^en.*
