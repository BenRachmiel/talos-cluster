          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 4
                  }
                ]
              }
            },
            "overrides": []
