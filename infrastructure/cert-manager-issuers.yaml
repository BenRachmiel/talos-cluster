# Let's Encrypt ClusterIssuers — apply after cert-manager is running
# Requires secret "cloudflare-api-token" in cert-manager namespace:
#   kubectl create secret generic cloudflare-api-token \
#     -n cert-manager --from-literal=api-token=<YOUR_TOKEN>
#
# Cloudflare token needs: Zone:DNS:Edit + Zone:Zone:Read for benrachmiel.org
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: "benjamin@benrachmiel.org"
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "benjamin@benrachmiel.org"
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
