apiVersion: v1
kind: Service
metadata:
  name: samba-ad
  namespace: samba-ad
  annotations:
    io.cilium/lb-ipam-ips: "192.168.2.201"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: samba-ad
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: kerberos-tcp
      port: 88
      targetPort: 88
      protocol: TCP
    - name: kerberos-udp
      port: 88
      targetPort: 88
      protocol: UDP
    - name: ldap
      port: 389
      targetPort: 389
      protocol: TCP
    - name: kpasswd-tcp
      port: 464
      targetPort: 464
      protocol: TCP
    - name: kpasswd-udp
      port: 464
      targetPort: 464
      protocol: UDP
    - name: ldaps
      port: 636
      targetPort: 636
      protocol: TCP
