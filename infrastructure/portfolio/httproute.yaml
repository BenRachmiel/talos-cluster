# Apex serves the portfolio; www 301-redirects to the apex.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio
  namespace: portfolio
spec:
  parentRefs:
    - name: main-gateway
      namespace: kube-system
  hostnames:
    - "benrachmiel.org"
  rules:
    - backendRefs:
        - name: portfolio
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio-www-redirect
  namespace: portfolio
spec:
  parentRefs:
    - name: main-gateway
      namespace: kube-system
  hostnames:
    - "www.benrachmiel.org"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            hostname: benrachmiel.org
            statusCode: 301
